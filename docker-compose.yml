services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mutant
      POSTGRES_PASSWORD: mutant
      POSTGRES_DB: mutant
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mutant"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: "postgresql://mutant:mutant@postgres:5432/mutant?schema=public"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node scripts/seed-counter.js && npm run start"
